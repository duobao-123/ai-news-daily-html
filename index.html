<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI News Container</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(180deg, #f0e6d8 0%, #f8f4ee 100%);
        color: #1f2937;
        font-family: Georgia, "Times New Roman", serif;
      }

      main {
        width: min(680px, calc(100% - 32px));
        padding: 32px;
        background: rgba(255, 252, 247, 0.94);
        box-shadow: 0 24px 60px rgba(77, 55, 32, 0.12);
      }

      h1 {
        margin: 0 0 16px;
        font-size: clamp(32px, 6vw, 56px);
        line-height: 1;
      }

      p {
        margin: 0 0 18px;
        font-size: 18px;
        line-height: 1.7;
      }

      a {
        color: #b63f2c;
        text-decoration: none;
        border-bottom: 1px solid currentColor;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>AI News</h1>
      <p>容器启动后，这个项目会以静态站点方式对外提供内容。</p>
      <p><a href="/ai-news-2026-07-17.html">打开今日 AI 新闻页面</a></p>
    </main>
  </body>
